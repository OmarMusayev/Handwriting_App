# deploy/nginx.conf

worker_processes 1;
events {
  worker_connections 1024;
}

http {
  # Define the Flask upstream (Gunicorn)
  upstream flask_app {
    server app:8000;
  }

  # Redirect all HTTP traffic to HTTPS
  server {
    listen 80;
    server_name hand-magic.com www.hand-magic.com;

    # Redirect everything to the same URL but https
    return 301 https://$host$request_uri;
  }

  # Main HTTPS server block
  server {
    listen 443 ssl http2;
    server_name hand-magic.com www.hand-magic.com;

    # SSL certificate paths (mounted from ./certs)
    ssl_certificate     /etc/letsencrypt/live/hand-magic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hand-magic.com/privkey.pem;

    # Optional strong SSL settings (can be customized further)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Proxy all requests to the Flask app
    location / {
      proxy_pass         http://flask_app;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        ""; 
      chunked_transfer_encoding off;
    }
  }
}

