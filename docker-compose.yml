services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: user-info-handwriting
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: "${PG_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  app:
    build:
      context: .
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://pgadmin:${PG_PASSWORD}@db:5432/user-info-handwriting"
      FLASK_ENV: "${FLASK_ENV}"
    depends_on:
      db:
        condition: service_started
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:

