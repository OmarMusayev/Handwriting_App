version: "3.9"
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: user-info-handwriting
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]

  app:
    build: .
    restart: always
    environment:
      DATABASE_URL: postgres://pgadmin:${PG_PASSWORD}@db:5432/user-info-handwriting
      FLASK_ENV: production
    depends_on: [db]
    networks: [internal]

  nginx:
    image: nginx:alpine
    restart: always
    ports: ["80:80"]
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [app]
    networks: [internal]

volumes:
  pgdata:
networks:
  internal:
